name: Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Determine and validate version
        id: version
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          python - <<'PY'
          import os
          import pathlib
          import re
          import subprocess

          root = pathlib.Path(".")
          pyproject = (root / "pyproject.toml").read_text()

          pyproject_match = re.search(r'^version = "([^"]+)"$', pyproject, re.MULTILINE)

          if pyproject_match is None:
            raise SystemExit("Could not determine version from pyproject.toml")

          pyproject_version = pyproject_match.group(1)
          release_tag = f"v{pyproject_version}"

          # Check if tag already exists
          result = subprocess.run(
              ["gh", "api", f"repos/{os.environ['GH_REPO']}/git/ref/tags/{release_tag}"],
              capture_output=True,
          )
          if result.returncode == 0:
            raise SystemExit(f"Tag {release_tag} already exists. Bump the version before releasing.")

          print(f"Release tag: {release_tag}")
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"tag={release_tag}\n")
          PY

  build-wheel:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runs-on: ubuntu-latest
          - arch: arm64
            runs-on: ubuntu-24.04-arm
          - arch: arm64
            runs-on: macos-latest
          - arch: amd64
            runs-on: windows-latest

    runs-on: ${{ matrix.runs-on }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: native-helper

      - name: Install maturin
        run: python -m pip install --upgrade pip maturin

      - name: Build wheel
        run: maturin build --release -o dist

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-wheel-${{ runner.os }}-${{ matrix.arch }}-py312
          path: dist/*.whl
          if-no-files-found: error

  create-release:
    needs: [prepare, build-wheel]
    runs-on: ubuntu-latest

    steps:
      - name: Download wheel artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: python-wheel-*
          path: release-assets

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ needs.prepare.outputs.tag }}
        run: |
          mapfile -d '' assets < <(find release-assets -type f -name '*.whl' -print0 | sort -z)
          if [ "${#assets[@]}" -eq 0 ]; then
            echo "No wheel assets found under release-assets" >&2
            exit 1
          fi

          prerelease_flag=""
          if [ "$GITHUB_REF_NAME" != "main" ]; then
            prerelease_flag="--prerelease"
          fi

          gh release create "$RELEASE_TAG" \
            --title "$RELEASE_TAG" \
            --generate-notes \
            --target "${GITHUB_SHA}" \
            $prerelease_flag \
            "${assets[@]}"

  deploy-pages:
    if: github.ref_name == 'main'
    needs: create-release
    uses: ./.github/workflows/deploy-pages.yml
    permissions:
      contents: read
      pages: write
      id-token: write
